<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Room | DormBook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="min-h-screen flex items-center justify-center relative bg-gray-50 overflow-hidden">

    <div class="fixed inset-0 z-0 opacity-40">
        <div class="w-full h-16 bg-white border-b flex items-center px-10 justify-between">
            <div class="font-bold text-xl text-gray-800">DormBook</div>
            <div class="flex gap-6 text-sm font-semibold text-indigo-600">
                <span>Admin Panel</span><span>My History</span>
            </div>
        </div>
        <div class="p-12 max-w-6xl mx-auto">
            <div class="h-10 w-64 bg-gray-300 rounded-lg mb-4"></div>
            <div class="h-4 w-48 bg-gray-200 rounded mb-12"></div>
            <div class="h-14 w-full bg-gray-100 rounded-2xl mb-10"></div>
            <div class="grid grid-cols-2 gap-8">
                <div class="h-72 bg-gray-200 rounded-3xl"></div>
                <div class="h-72 bg-gray-200 rounded-3xl"></div>
            </div>
        </div>
    </div>

    <div class="fixed inset-0 bg-white/30 backdrop-blur-2xl z-10"></div>

    <div id="reservation-panel" class="relative z-20 bg-white max-w-2xl w-full rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col md:flex-row border border-white">
        
        <div class="md:w-1/2 bg-gray-900 text-white p-10 flex flex-col justify-between">
            <div>
                <span class="bg-indigo-500 text-[10px] px-2 py-1 rounded font-bold uppercase tracking-wider">Booking Summary</span>
                <h2 id="room-name" class="text-3xl font-bold mt-4 italic">Selected Room</h2>
                <p id="room-desc" class="text-gray-400 text-sm mt-2">Loading room details...</p>
            </div>
            <div class="text-xs text-gray-500">
                <p><i class="fa-solid fa-circle-info mr-2"></i> Review your details before confirming.</p>
            </div>
        </div>
        
        <div class="md:w-1/2 p-10 bg-white/80">
            <h3 class="text-xl font-bold mb-6">Details</h3>
            <form id="booking-form" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Move-in Date</label>
                    <input type="date" name="start_date" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition" required>
                </div>
                
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Duration</label>
                    <input type="number" name="duration" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition" placeholder="Months (e.g. 6)" min="1" required>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Special Requests</label>
                    <textarea name="special_request" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl h-24 outline-none focus:ring-2 focus:ring-indigo-500 transition" placeholder="Anything else we should know?"></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="window.location.href='index.html'" 
                        class="flex-1 bg-gray-100 text-gray-500 py-4 rounded-xl font-bold hover:bg-gray-200 transition">
                        Back
                    </button>
                    <button type="submit" 
                        class="flex-[2] bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">
                        Confirm Booking
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="success-panel" class="hidden fixed inset-0 bg-white/60 backdrop-blur-3xl z-50 flex flex-col items-center justify-center text-center p-10">
        <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mb-6 animate-bounce">
            <i class="fa-solid fa-check"></i>
        </div>
        <h2 class="text-4xl font-black mb-4 tracking-tight">Booking Sent!</h2>
        <p class="text-gray-500 mb-10 max-w-md">Your request has been submitted to the owner. You can check the status in your booking history.</p>
        <a href="index.html" class="bg-black text-white px-10 py-4 rounded-2xl font-bold hover:scale-105 transition-transform">Return Home</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const roomName = params.get('room');
            const roomDescription = params.get('desc');

            // 1. Fill the UI with Room Data from URL
            if (roomName) {
                document.getElementById('room-name').innerText = decodeURIComponent(roomName);
            }
            
            if (roomDescription) {
                document.getElementById('room-desc').innerText = decodeURIComponent(roomDescription);
            } else {
                document.getElementById('room-desc').innerText = "All-inclusive utilities, high-speed WiFi, and 24/7 security.";
            }

            // Set minimum date to today (prevent booking from past dates, but allow today)
            const startDateInput = document.querySelector('input[name="start_date"]');
            const today = new Date();
            const minDate = today.toISOString().split('T')[0];
            startDateInput.setAttribute('min', minDate);

            // 2. Handle Form Submission
            document.getElementById('booking-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) {
                    alert("Session expired. Please login again.");
                    window.location.href = "auth.html";
                    return;
                }

                const formData = new FormData(e.target);
                const selectedDateString = formData.get('start_date');
                
                // Get today's date in YYYY-MM-DD format
                const today = new Date();
                const todayString = today.toISOString().split('T')[0];

                // Validate that start date is not in the past (compare as strings in YYYY-MM-DD format)
                if (selectedDateString < todayString) {
                    alert("Move-in date cannot be in the past. Please select today or a future date.");
                    return;
                }

                const data = {
                user_id: user.id,
                student_name: user.name,
                room_name: document.getElementById('room-name').innerText,
                start_date: formData.get('start_date'),
    
                // CHANGE THIS LINE: Remove the + " Months"
                duration: parseInt(formData.get('duration')), 
    
                special_request: formData.get('special_request'),
                status: 'Pending',
                created_at: new Date().toISOString()
                };

                try {
                    // NOTE: Ensure your backend endpoint is /api/book
                    window.showPageLoader();
                    const res = await fetch('/api/book', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    if (res.ok) {
                        document.getElementById('reservation-panel').classList.add('hidden');
                        document.getElementById('success-panel').classList.remove('hidden');
                        window.hidePageLoader();
                    } else {
                        window.hidePageLoader();
                        const errData = await res.json();
                        alert("Error: " + (errData.message || "Failed to submit booking."));
                    }
                } catch (error) {
                    window.hidePageLoader();
                    console.error("Fetch error:", error);
                    alert("Network error. Is your server running?");
                }
            });
        });
    </script>
    <script src="page-loader.js"></script>
</body>
</html>
