<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Management | DormBook</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
html { scroll-behavior: smooth; overflow-y: scroll; scrollbar-gutter: stable; }
body { background-color: #f9fafb; min-height: 100vh; height: auto !important; overflow-y: auto !important; scrollbar-gutter: stable; }

.dropdown-menu { display: none; transform-origin: top; animation: slideIn 0.2s ease-out; }
.dropdown-menu.show { display: block; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

#switch-account-menu { display: none !important; pointer-events: none; opacity: 0; transition: opacity 0.2s ease-out; }
#switch-account-menu:not(.hidden) { display: flex !important; pointer-events: auto; opacity: 1; }

#sidebar-drawer { transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); right: 0; top: 0; height: 100%; width: 20rem; }
#sidebar-overlay.active { opacity: 1; pointer-events: auto; }

.mobile-only { display: flex !important; }

.mgmt-section { min-height: 40vh; padding-top: 2rem; padding-bottom: 5rem; }
</style>
</head>

<body class="text-gray-900">

<nav class="fixed top-0 left-0 right-0 flex justify-between items-center px-8 py-4 bg-white/80 backdrop-blur-md border-b z-50 min-h-16">
    <div class="text-xl font-bold flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
        <i class="fa-solid fa-building-circle-check text-indigo-600"></i> DormBook
    </div>
    <div id="nav-center" class="absolute left-1/2 transform -translate-x-1/2 hidden md:flex gap-8 items-center justify-center"></div>
    <div id="nav-right" class="flex justify-end items-center gap-4"></div>
</nav>

<div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[60] opacity-0 pointer-events-none transition-opacity duration-300"></div>

<div id="sidebar-drawer" class="fixed top-0 right-0 h-full w-80 bg-white z-[70] shadow-2xl transform translate-x-full p-8 flex flex-col overflow-hidden">
    <div class="flex justify-between items-center mb-8">
        <span class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Account</span>
        <div class="flex gap-2">
            <button type="button" id="switch-account-icon-btn" onclick="toggleSwitchAccountMenu(event)" class="w-12 h-12 flex items-center justify-center bg-gray-100 rounded-2xl border hover:bg-gray-200 transition cursor-pointer" title="Switch Account">
                <i class="fa-solid fa-arrow-right-arrow-left text-gray-600"></i>
            </button>
            <button onclick="toggleSidebar()" class="w-12 h-12 flex flex-col items-center justify-center bg-gray-100 rounded-2xl border hover:bg-gray-200 transition">

    </div>

    <div id="sidebar-profile-box" class="mb-10"></div>

<div class="max-w-7xl mx-auto px-8 pt-20">
    <div class="flex justify-between items-end py-10">

            <h1 class="text-4xl font-black mb-2 tracking-tight uppercase">Management</h1>

        </div>
        <button onclick="refreshAdminData()" class="bg-white border border-gray-200 px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-gray-50 transition shadow-sm">
            <i class="fa-solid fa-rotate mr-2 text-indigo-600"></i> Refresh
        </button>
    </div>

    <div class="space-y-12">
        <!-- Pending Requests Section -->
        <section id="pending-section" class="mgmt-section scroll-mt-24">
            <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">
                <i class="fa-solid fa-envelope-open-text text-indigo-600 mr-2"></i> Pending Requests

            <div class="bg-white rounded-[2.5rem] border border-gray-100 shadow-sm overflow-x-auto">

                        <tr>

                            <th class="p-6">Dorm</th>

        <!-- Resident Due Dates Section -->

            <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">
                <i class="fa-solid fa-calendar-day text-indigo-600 mr-2"></i> Resident Due Dates
            </h2>
            <div class="bg-indigo-600 p-10 rounded-[3rem] text-white shadow-xl">
                <div id="due-soon-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </section>

        <!-- Dorm Inventory Section -->
        <section id="inventory-section" class="mgmt-section scroll-mt-24">
            <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">
                <i class="fa-solid fa-door-open text-indigo-600 mr-2"></i> Dorm Inventory Status
            </h2>
            <div class="bg-white rounded-[2.5rem] border border-gray-100 shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50/50 text-[10px] font-black uppercase text-gray-400 border-b">
                        <tr>
                            <th class="p-6">Dorm Name</th>
                            <th class="p-6 text-center">Type</th>
                            <th class="p-6">Monthly Rate</th>
                            <th class="p-6">Resident Status</th>
                            <th class="p-6">Availability</th>
                            <th class="p-6 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="management-inventory-list" class="text-sm divide-y divide-gray-50"></tbody>

            </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    setupNavbar();
    refreshAdminData();
});

// NAVBAR + SIDEBAR SETUP

            <div id="management-dropdown" class="dropdown-menu absolute top-full left-0 mt-2 w-64 bg-white rounded-2xl shadow-xl border border-gray-100 py-2 z-50 overflow-hidden">

            <button onclick="toggleDropdown(event,'panel-dropdown')" class="text-xs font-black text-gray-500 uppercase tracking-widest hover:text-indigo-600 flex items-center gap-2">
                Panel <i class="fa-solid fa-chevron-down text-[10px]"></i>
            </button>

                    <i class="fa-solid fa-users-gear mr-2 text-sm text-indigo-500"></i> User Management

            </div>
        </div>

    </div>`;

    // Hamburger for sidebar
    navRight.innerHTML = `
    <button onclick="toggleSidebar()" class="mobile-only w-12 h-12 flex flex-col items-center justify-center bg-gray-100 rounded-2xl border border-gray-200 hover:bg-gray-200 transition">
        <div class="w-6 h-0.5 bg-gray-800 mb-1"></div>
        <div class="w-6 h-0.5 bg-gray-800 mb-1"></div>
        <div class="w-6 h-0.5 bg-gray-800"></div>
    </button>`;

    // Sidebar profile box
    document.getElementById('sidebar-profile-box').innerHTML = `
    <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-[2rem] border border-gray-100 cursor-pointer hover:bg-gray-100 transition" onclick="window.location.href='profile.html'">
        <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white"><i class="fa-solid fa-user-shield"></i></div>
        <div class="text-left flex-grow">
            <p class="text-[9px] font-black text-indigo-500 uppercase leading-none">ADMIN</p>
            <p class="text-sm font-bold text-gray-800">${user.name}</p>
        </div>
        <i class="fa-solid fa-chevron-right text-gray-400 text-sm"></i>
    </div>`;

    // Sidebar links
    document.getElementById('sidebar-links').innerHTML = `
    <a href="index.html" class="flex items-center gap-4 p-4 rounded-2xl text-xs font-black uppercase tracking-widest text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 transition">

// SIDEBAR + DROPDOWN FUNCTIONS
function toggleSidebar() {
    document.getElementById('sidebar-drawer').classList.toggle('translate-x-full');
    document.getElementById('sidebar-overlay').classList.toggle('active');
}
function toggleDropdown(e, id) {
    e.stopPropagation();
    const menus = document.querySelectorAll('.dropdown-menu');
    const target = document.getElementById(id);
    menus.forEach(m => { if(m !== target) m.classList.remove('show'); });
    target.classList.toggle('show');
}
window.onclick = () => document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));

function logout() { 
    localStorage.removeItem('user'); 
    window.location.href = 'auth.html'; 
}

function openAccountSelectorFromList(idx) {
    const switchUsers = window.__switchUsers || JSON.parse(localStorage.getItem('savedUsers') || '[]');
    const selected = switchUsers[idx];
    if (!selected) return;

    fetch(`/api/users/${selected.id}/last_login`, { method: 'PATCH' })
        .catch(() => console.warn('Could not update last_login in DB'))
        .finally(() => {
            localStorage.setItem('user', JSON.stringify(selected));
            const destination = (selected.role === 'admin') ? 'admin_panel.html' : 'index.html';
            window.location.href = destination;
        });
}

async function loadSwitchAccounts() {
    const menu = document.getElementById('switch-account-menu');
    if (!menu) return;

    let savedUsers = [];
    try {
        const usersRes = await fetch('/api/users?t=' + Date.now());
        if (usersRes.ok) savedUsers = await usersRes.json();
    } catch (err) {
        console.warn('Failed to load users from DB, falling back to localStorage', err);
    }

    if (savedUsers.length === 0) {
        savedUsers = JSON.parse(localStorage.getItem('savedUsers') || '[]');
    }

    if (savedUsers.length === 0) {
        menu.innerHTML = `<div class="px-3 py-2 text-xs text-gray-500">No saved users. <a href="auth.html" class="text-indigo-600 underline">Login/Register</a></div>`;
        return;
    }

    window.__switchUsers = savedUsers;
    menu.innerHTML = `<div class="flex flex-col space-y-1">
        ${savedUsers.map((u, idx) => {
            const label = `${u.name || u.email || 'User'} (${u.role || 'user'})`;
            return `<button onclick="openAccountSelectorFromList(${idx})" class="w-full text-left px-3 py-2 text-xs font-black text-gray-700 hover:bg-gray-100 rounded-xl">${label}</button>`;
        }).join('')}
    </div>`;
}

function adjustSwitchAccountMenuDirection(button, menu) {
    if (!button || !menu) return;
    const rect = button.getBoundingClientRect();
    const menuHeight = menu.offsetHeight || 180;
    const viewportHeight = window.innerHeight;
    const spaceBelow = viewportHeight - rect.bottom;
    const spaceAbove = rect.top;

    if (spaceBelow < menuHeight + 8 && spaceAbove > menuHeight + 8) {
        menu.style.bottom = `${rect.height + 4}px`;
        menu.style.top = 'auto';
    } else {
        menu.style.top = `${rect.height + 4}px`;
        menu.style.bottom = 'auto';
    }
}

function toggleSwitchAccountMenu(e) {
    e.stopPropagation();
    const menu = document.getElementById('switch-account-menu');

    if (!menu) {
        console.error('Menu element not found');
        return;
    }

    const isHidden = menu.classList.contains('hidden');

    if (isHidden) {
        menu.classList.remove('hidden');
        loadSwitchAccounts();
    } else {
        menu.classList.add('hidden');
    }
}

// ----------------------
// EXISTING API FUNCTIONS
// ----------------------
async function refreshAdminData() {
    const user = JSON.parse(localStorage.getItem('user'));
    const adminName = user ? user.name : 'Admin';
    await fetchInventory(adminName);
    await fetchPendingRequests(adminName);
    await fetchDueDates();
}

// fetchDueDates(), fetchInventory(), fetchPendingRequests(), updateStatus(), deleteDorm()
async function fetchDueDates() {
            const container = document.getElementById('due-soon-list');
            try {
                const res = await fetch('/api/admin/bookings?t=' + Date.now());
                const bookings = await res.json();
                const residents = bookings.filter(b => b.status === 'Approved');

                if (residents.length === 0) {
                    container.innerHTML = `<p class="text-indigo-200 text-xs font-black uppercase italic">No active residents found.</p>`;
                    return;
                }

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                container.innerHTML = residents.map(r => {
                    // FIX: Robust local timezone date parsing to avoid off-by-one shifts
                    const startStr = r.start_date ? r.start_date.split('T')[0] : '';
                    let moveInDate;
                    if (startStr) {
                        const [year, month, day] = startStr.split('-');
                        moveInDate = new Date(year, month - 1, day);
                    } else {
                        moveInDate = new Date(); // Fallback if no start_date is somehow provided
                    }
                    
                    const dueDate = new Date(moveInDate);
                    
                    // FIX: Adding exactly 1 month instead of 30 days for accurate billing
                    dueDate.setMonth(moveInDate.getMonth() + 1);
                    dueDate.setHours(0, 0, 0, 0);

                    const timeDiff = dueDate - today;
                    const daysRemaining = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
                    
                    let statusText = "";
                    if (daysRemaining < 0) {
                        statusText = "OVERDUE";
                    } else if (daysRemaining === 0) {
                        statusText = "DUE TODAY";
                    } else {
                        statusText = `${daysRemaining} days left`;
                    }

                    return `
                        <div class="bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/10 flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <span class="px-3 py-1 ${daysRemaining <= 0 ? 'bg-red-500' : 'bg-white/20'} rounded-full text-[9px] font-black uppercase">${statusText}</span>
                                    <i class="fa-solid fa-user-clock text-indigo-300"></i>
                                </div>
                                <p class="text-[10px] font-black uppercase text-indigo-200 mb-1">${r.room_name}</p>
                                <p class="text-lg font-bold">${r.user_name}</p>
                            </div>
                            <div class="mt-6 pt-4 border-t border-white/5 flex justify-between items-center">
                                <span class="text-[10px] font-black uppercase tracking-wider opacity-60">Due Date</span>
                                <span class="text-xs font-bold">${dueDate.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
                            </div>
                        </div>`;
                }).join('');
            } catch (err) { 
                console.error("Error fetching due dates:", err);
                container.innerHTML = `<p class="text-red-300 text-xs font-black">Error loading tracking data.</p>`; 
            }
        }

        async function fetchInventory(adminName) {
            const list = document.getElementById('management-inventory-list');
            try {
                const res = await fetch('/api/rooms'); 
                const dorms = await res.json();
                
                // Escape adminName for inline handlers to prevent quote breaks
                const safeAdminName = adminName.replace(/'/g, "\\'");

                list.innerHTML = dorms.map(dorm => `
                    <tr class="hover:bg-gray-50/50 transition-colors">
                        <td class="p-6">
                            <div class="flex items-center gap-3">
                                <img src="${dorm.image_url}" class="w-10 h-10 rounded-xl object-cover border border-gray-100" onerror="this.src='https://via.placeholder.com/100'">
                                <p class="font-bold text-gray-800 uppercase tracking-tight">${dorm.name}</p>
                            </div>
                        </td>
                        <td class="p-6 text-center">
                            <span class="text-[10px] font-black uppercase bg-gray-100 text-gray-500 px-2 py-1 rounded-md">
                                ${dorm.room_type || 'Unset'}
                            </span>
                        </td>
                        <td class="p-6 font-bold text-indigo-600">₱${dorm.price}</td>
                        <td class="p-6 text-gray-500 font-medium">${dorm.is_occupied ? 'Occupied' : '—'}</td>
                        <td class="p-6">
                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${!dorm.is_occupied ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                                ${dorm.is_occupied ? 'Occupied' : 'Available'}
                            </span>
                        </td>
                        <td class="p-6 text-right">
                            <button onclick="deleteDorm(${dorm.id}, '${safeAdminName}')" class="w-8 h-8 rounded-lg bg-gray-50 text-gray-400 hover:bg-red-50 hover:text-red-600 transition flex items-center justify-center ml-auto">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>
                        </td>
                    </tr>`).join('');
            } catch (err) { console.error(err); }
        }

        async function deleteDorm(id, adminName) {
            if (!confirm("Delete this dorm?")) return;
            try {
                await fetch(`/api/dorms/${id}?adminName=${encodeURIComponent(adminName)}`, { method: 'DELETE' });
                refreshAdminData();
            } catch (err) {
                console.error("Error deleting dorm:", err);
            }
        }

        async function fetchPendingRequests(adminName) {
            const list = document.getElementById('admin-booking-list');
            try {
                const res = await fetch('/api/admin/bookings?t=' + Date.now());
                const bookings = await res.json();
                const pending = bookings.filter(b => b.status === 'Pending');

                if (pending.length === 0) {
                    list.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-gray-300 uppercase text-[10px] font-black">No pending requests</td></tr>`;
                    return;
                }

                // Escape adminName for inline handlers to prevent quote breaks
                const safeAdminName = adminName.replace(/'/g, "\\'");

                list.innerHTML = pending.map(b => `
                    <tr>
                        <td class="p-6 font-bold uppercase text-gray-800">${b.user_name || 'Student'}</td>
                        <td class="p-6 font-medium text-gray-500">${b.room_name}</td>
                        <td class="p-6 text-center">
                            ${b.receipt_url ? `<button onclick="window.open('${b.receipt_url}', '_blank')" class="text-indigo-600 text-[10px] font-black uppercase underline">View</button>` : '—'}
                        </td>
                        <td class="p-6">
                            <div class="flex justify-center gap-2">
                                <button onclick="updateStatus('${b.id}', 'Approved', '${safeAdminName}')" class="px-4 py-2 bg-black text-white rounded-xl text-[10px] font-black uppercase hover:bg-indigo-600 transition">Approve</button>
                                <button onclick="updateStatus('${b.id}', 'Rejected', '${safeAdminName}')" class="px-4 py-2 bg-gray-100 text-gray-400 rounded-xl text-[10px] font-black uppercase hover:bg-red-50 hover:text-red-600 transition">Reject</button>
                            </div>
                        </td>
                    </tr>`).join('');
            } catch (err) { console.error(err); }
        }

        async function updateStatus(id, status, adminName) {
            try {
                await fetch(`/api/bookings/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status, adminName })
                });
                refreshAdminData();
            } catch (err) {
                console.error("Error updating status:", err);
            }
        }

</script>
<script src="page-loader.js"></script>
</body>
</html>
