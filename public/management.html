// SIDEBAR + DROPDOWN FUNCTIONS
function toggleSidebar() {
    document.getElementById('sidebar-drawer').classList.toggle('translate-x-full');
    document.getElementById('sidebar-overlay').classList.toggle('active');
}
function toggleDropdown(e, id) {
    e.stopPropagation();
    const menus = document.querySelectorAll('.dropdown-menu');
    const target = document.getElementById(id);
    menus.forEach(m => { if(m !== target) m.classList.remove('show'); });
    target.classList.toggle('show');
}
window.onclick = () => document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));

function logout() { 
    localStorage.removeItem('user'); 
    window.location.href = 'auth.html'; 
}

// ----------------------
// EXISTING API FUNCTIONS
// ----------------------
async function refreshAdminData() {
    const user = JSON.parse(localStorage.getItem('user'));
    const adminName = user ? user.name : 'Admin';
    await fetchInventory(adminName);
    await fetchPendingRequests(adminName);
    await fetchDueDates();
}

// fetchDueDates(), fetchInventory(), fetchPendingRequests(), updateStatus(), deleteDorm()
async function fetchDueDates() {
            const container = document.getElementById('due-soon-list');
            try {
                const res = await fetch('/api/admin/bookings?t=' + Date.now());
                const bookings = await res.json();
                const residents = bookings.filter(b => b.status === 'Approved');

                if (residents.length === 0) {
                    container.innerHTML = `<p class="text-indigo-200 text-xs font-black uppercase italic">No active residents found.</p>`;
                    return;
                }

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                container.innerHTML = residents.map(r => {
                    // FIX: Robust local timezone date parsing to avoid off-by-one shifts
                    const startStr = r.start_date ? r.start_date.split('T')[0] : '';
                    let moveInDate;
                    if (startStr) {
                        const [year, month, day] = startStr.split('-');
                        moveInDate = new Date(year, month - 1, day);
                    } else {
                        moveInDate = new Date(); // Fallback if no start_date is somehow provided
                    }
                    
                    const dueDate = new Date(moveInDate);
                    
                    // FIX: Adding exactly 1 month instead of 30 days for accurate billing
                    dueDate.setMonth(moveInDate.getMonth() + 1);
                    dueDate.setHours(0, 0, 0, 0);

                    const timeDiff = dueDate - today;
                    const daysRemaining = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
                    
                    let statusText = "";
                    if (daysRemaining < 0) {
                        statusText = "OVERDUE";
                    } else if (daysRemaining === 0) {
                        statusText = "DUE TODAY";
                    } else {
                        statusText = `${daysRemaining} days left`;
                    }

                    return `
                        <div class="bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/10 flex flex-col justify-between cursor-pointer hover:bg-white/20 transition-all duration-200 hover:border-white/20" onclick="openBookingModal(${JSON.stringify(r).replace(/"/g, '&quot;')})">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <span class="px-3 py-1 ${daysRemaining <= 0 ? 'bg-red-500' : 'bg-white/20'} rounded-full text-[9px] font-black uppercase">${statusText}</span>
                                    <i class="fa-solid fa-user-clock text-indigo-300"></i>
                                </div>
                                <p class="text-[10px] font-black uppercase text-indigo-200 mb-1">${r.room_name}</p>
                                <p class="text-lg font-bold">${r.user_name}</p>
                            </div>
                            <div class="mt-6 pt-4 border-t border-white/5 flex justify-between items-center">
                                <span class="text-[10px] font-black uppercase tracking-wider opacity-60">Due Date</span>
                                <span class="text-xs font-bold">${dueDate.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
                            </div>
                        </div>`;
                }).join('');
            } catch (err) { 
                console.error("Error fetching due dates:", err);
                container.innerHTML = `<p class="text-red-300 text-xs font-black">Error loading tracking data.</p>`; 
            }
        }

        async function fetchInventory(adminName) {
            const list = document.getElementById('management-inventory-list');
            try {
                const [roomRes, bookingRes] = await Promise.all([
                    fetch('/api/rooms'),
                    fetch('/api/admin/bookings?t=' + Date.now())
                ]);
                const dorms = await roomRes.json();
                const bookings = await bookingRes.json();
                
                // Count approved residents per room (case-insensitive, trim spaces)
                const residentCount = {};
                bookings.forEach(b => {
                    if (b.status === 'Approved') {
                        const roomKey = (b.room_name || '').toLowerCase().trim();
                        residentCount[roomKey] = (residentCount[roomKey] || 0) + 1;
                    }
                });
                
                // Map room type to capacity
                const getCapacity = (roomType) => {
                    if (!roomType) return 1;
                    const type = roomType.toLowerCase();
                    if (type.includes('single')) return 1;
                    if (type.includes('double')) return 2;
                    if (type.includes('triple')) return 3;
                    if (type.includes('quad')) return 4;
                    return 1; // Default
                };
                
                // Escape adminName for inline handlers to prevent quote breaks
                const safeAdminName = adminName.replace(/'/g, "\\'");

                list.innerHTML = dorms.map(dorm => {
                    const capacity = getCapacity(dorm.room_type);
                    const roomKey = (dorm.name || '').toLowerCase().trim();
                    const currentCount = residentCount[roomKey] || 0;
                    const isFull = currentCount >= capacity;

                    return `
                    <tr class="hover:bg-gray-50/50 transition-colors">
                        <td class="p-6">
                            <div class="flex items-center gap-3">
                                <img src="${dorm.image_url}" class="w-10 h-10 rounded-xl object-cover border border-gray-100" onerror="this.src='https://placehold.co/100x100?text=No+Image'">
                                <p class="font-bold text-gray-800 uppercase tracking-tight">${dorm.name}</p>
                            </div>
                        </td>
                        <td class="p-6 text-center">
                            <span class="text-[10px] font-black uppercase bg-gray-100 text-gray-500 px-2 py-1 rounded-md">
                                ${dorm.room_type || 'Unset'}
                            </span>
                        </td>
                        <td class="p-6 font-bold text-indigo-600">₱${dorm.price}</td>
                        <td class="p-6 text-gray-500 font-medium font-bold">${currentCount}/${capacity}</td>
                        <td class="p-6">
                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${!isFull ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                                ${isFull ? 'Occupied' : 'Available'}
                            </span>
                        </td>
                        <td class="p-6">
                            <div class="flex justify-center">
                                <button onclick="deleteDorm('${dorm.id}')" class="w-8 h-8 rounded-lg bg-gray-50 text-gray-400 hover:bg-red-50 hover:text-red-600 transition flex items-center justify-center">
                                    <i class="fa-solid fa-trash-can text-xs"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`;
                }).join('');
            } catch (err) { console.error(err); }
        }

        async function deleteDorm(id) {
            if (!confirm("Delete this dorm?")) return;
            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const adminName = user ? user.name : 'Admin';
                await fetch(`/api/dorms/${id}?adminName=${encodeURIComponent(adminName)}`, { method: 'DELETE' });
                refreshAdminData();
            } catch (err) {
                console.error("Error deleting dorm:", err);
            }
        }

        async function fetchPendingRequests(adminName) {
            const list = document.getElementById('admin-booking-list');
            try {
                const res = await fetch('/api/admin/bookings?t=' + Date.now());
                const bookings = await res.json();
                const pending = bookings.filter(b => b.status === 'Pending');

                if (pending.length === 0) {
                    list.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-gray-300 uppercase text-[10px] font-black">No pending requests</td></tr>`;
                    return;
                }

                // Escape adminName for inline handlers to prevent quote breaks
                const safeAdminName = adminName.replace(/'/g, "\\'");

                list.innerHTML = pending.map(b => `
                    <tr>
                        <td class="p-6 font-bold uppercase text-gray-800">${b.user_name || 'Student'}</td>
                        <td class="p-6 font-medium text-gray-500">${b.room_name}</td>
                        <td class="p-6 text-center">
                            ${b.receipt_url ? `<button onclick="window.open('${b.receipt_url}', '_blank')" class="text-indigo-600 text-[10px] font-black uppercase underline">View</button>` : '—'}
                        </td>
                        <td class="p-6">
                            <div class="flex justify-center gap-2">
                                <button onclick="updateStatus('${b.id}', 'Approved', '${safeAdminName}')" class="px-4 py-2 bg-black text-white rounded-xl text-[10px] font-black uppercase hover:bg-indigo-600 transition">Approve</button>
                                <button onclick="updateStatus('${b.id}', 'Rejected', '${safeAdminName}')" class="px-4 py-2 bg-gray-100 text-gray-400 rounded-xl text-[10px] font-black uppercase hover:bg-red-50 hover:text-red-600 transition">Reject</button>
                            </div>
                        </td>
                    </tr>`).join('');
            } catch (err) { console.error(err); }
        }

        async function updateStatus(id, status, adminName) {
            try {
                window.showPageLoader();
                await fetch(`/api/bookings/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status, adminName })
                });
                await refreshAdminData();
                window.hidePageLoader();
            } catch (err) {
                window.hidePageLoader();
                console.error("Error updating status:", err);
            }
        }

        // BOOKING MODAL FUNCTIONS
        let currentBookingId = null;
        let currentBookingData = null;
        
        function openBookingModal(booking) {
            const modal = document.getElementById('booking-modal');
            const content = document.getElementById('modal-content');
            currentBookingId = booking.id;
            currentBookingData = booking;
            
            const startStr = booking.start_date ? booking.start_date.split('T')[0] : '';
            const [year, month, day] = startStr.split('-');
            const moveInDate = new Date(year, month - 1, day);
            const dueDate = new Date(moveInDate);
            dueDate.setMonth(moveInDate.getMonth() + 1);
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const timeDiff = dueDate - today;
            const daysRemaining = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
            
            let statusBadge = '';
            if (daysRemaining < 0) {
                statusBadge = '<span class="px-4 py-2 bg-red-100 text-red-600 rounded-xl text-xs font-black uppercase">OVERDUE</span>';
            } else if (daysRemaining === 0) {
                statusBadge = '<span class="px-4 py-2 bg-yellow-100 text-yellow-600 rounded-xl text-xs font-black uppercase">DUE TODAY</span>';
            } else {
                statusBadge = `<span class="px-4 py-2 bg-green-100 text-green-600 rounded-xl text-xs font-black uppercase">${daysRemaining} DAYS LEFT</span>`;
            }
            
            content.innerHTML = `
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-xs text-gray-400 font-black uppercase tracking-widest mb-2">Payment Status</p>
                            ${statusBadge}
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gray-50 p-4 rounded-xl">
                            <p class="text-xs text-gray-400 font-black uppercase tracking-widest mb-2">Student Name</p>
                            <p class="text-lg font-bold text-gray-800">${booking.user_name || 'N/A'}</p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl">
                            <p class="text-xs text-gray-400 font-black uppercase tracking-widest mb-2">Room</p>
                            <p class="text-lg font-bold text-indigo-600">${booking.room_name || 'N/A'}</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gray-50 p-4 rounded-xl">
                            <p class="text-xs text-gray-400 font-black uppercase tracking-widest mb-2">Move-In Date</p>
                            <p class="text-sm font-bold text-gray-800">${moveInDate.toLocaleDateString('en-PH', { month: 'long', day: 'numeric', year: 'numeric' })}</p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl">
                            <p class="text-xs text-gray-400 font-black uppercase tracking-widest mb-2">Due Date</p>
                            <p class="text-sm font-bold text-gray-800">${dueDate.toLocaleDateString('en-PH', { month: 'long', day: 'numeric', year: 'numeric' })}</p>
                        </div>
                    </div>
                    
                    <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                        <p class="text-xs text-indigo-600 font-black uppercase tracking-widest mb-2">Booking ID</p>
                        <p class="text-sm font-mono font-bold text-indigo-900">${booking.id || 'N/A'}</p>
                    </div>
                    
                    ${booking.notes ? `<div class="bg-gray-50 p-4 rounded-xl"><p class="text-xs text-gray-400 font-black uppercase tracking-widest mb-2">Notes</p><p class="text-sm text-gray-700">${booking.notes}</p></div>` : ''}
                </div>
            `;
            
            // Show/hide View Receipt button based on whether receipt exists
            const viewReceiptBtn = document.getElementById('view-receipt-btn');
            if (booking.receipt_url) {
                viewReceiptBtn.style.display = 'inline-flex';
            } else {
                viewReceiptBtn.style.display = 'none';
            }
            
            modal.classList.add('opacity-100', 'pointer-events-auto');
            modal.querySelector('div').classList.add('scale-100');
        }
        
        function closeBookingModal() {
            const modal = document.getElementById('booking-modal');
            modal.classList.remove('opacity-100', 'pointer-events-auto');
            modal.querySelector('div').classList.remove('scale-100');
            currentBookingId = null;
            currentBookingData = null;
        }
        
        async function deleteBooking() {
            if (!currentBookingId) return;
            if (!confirm('Are you sure you want to delete this booking? This action cannot be undone.')) return;
            
            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const adminName = user ? user.name : 'Admin';
                await fetch(`/api/bookings/${currentBookingId}?adminName=${encodeURIComponent(adminName)}`, { method: 'DELETE' });
                closeBookingModal();
                refreshAdminData();
            } catch (err) {
                console.error('Error deleting booking:', err);
                alert('Failed to delete booking');
            }
        }

        function viewReceipt() {
            if (!currentBookingData || !currentBookingData.receipt_url) {
                alert('No receipt available for this booking.');
                return;
            }
            
            const receiptViewer = document.getElementById('receipt-viewer-modal');
            const receiptImage = document.getElementById('receipt-image');
            const downloadLink = document.getElementById('download-receipt-link');
            
            receiptImage.src = currentBookingData.receipt_url;
            downloadLink.href = currentBookingData.receipt_url;
            downloadLink.download = `receipt-${currentBookingData.id}.jpg`;
            
            receiptViewer.classList.add('opacity-100', 'pointer-events-auto');
            receiptViewer.querySelector('div').classList.add('scale-100');
        }
        
        function closeReceiptViewer() {
            const receiptViewer = document.getElementById('receipt-viewer-modal');
            receiptViewer.classList.remove('opacity-100', 'pointer-events-auto');
            receiptViewer.querySelector('div').classList.remove('scale-100');
        }
        
        document.getElementById('booking-modal').addEventListener('click', closeBookingModal);

</script>
<script src="page-loader.js"></script>
</body>
</html>
