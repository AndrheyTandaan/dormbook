<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up | DormBook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-card { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <div class="auth-card bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div id="logo-header" class="text-3xl font-black text-indigo-600 mb-2 select-none">
                <i class="fa-solid fa-building-circle-check"></i> DormBook
            </div>
            <h2 id="auth-title" class="text-xl font-bold text-gray-900 uppercase tracking-tight">Welcome!</h2>
            <p id="auth-subtitle" class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Please enter your details to login.</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div id="name-field" class="hidden">
                <label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Full Name</label>
                <input type="text" id="input-name" name="name" placeholder="Juan Dela Cruz" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm">
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Email Address</label>
                <input type="email" name="email" required placeholder="example@gmail.com" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm">
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Password</label>
                <div class="relative">
                    <input type="password" id="password-input" name="password" required placeholder="••••••••" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm pr-12">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 hover:text-indigo-600 transition">
                        <i id="eye-icon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 mt-2">
                Login
            </button>
        </form>

        <div class="mt-8 text-center">
            <span id="toggle-text" class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Don't have an account?</span>
            <button id="toggle-btn" class="text-indigo-600 text-[10px] font-black uppercase tracking-widest hover:underline ml-1">Sign Up</button>
        </div>
        
        <div class="mt-6 text-center">
            <a href="welcome.html" class="text-gray-300 text-[9px] font-black uppercase tracking-tighter hover:text-gray-500 transition">
                <i class="fa-solid fa-arrow-left"></i> Back to Start
            </a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="page-loader.js"></script>
</body>
</html>
