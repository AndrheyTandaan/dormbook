<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | DormBook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-card { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <div class="auth-card bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="text-3xl font-black text-indigo-600 mb-2 select-none">
                <i class="fa-solid fa-building-circle-check"></i> DormBook
            </div>
            <h2 class="text-xl font-bold text-gray-900 uppercase tracking-tight">Reset Password</h2>
            <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Enter your new password</p>
        </div>

        <form id="reset-password-form" class="space-y-4">
            <div>
                <label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">New Password</label>
                <div class="relative">
                    <input type="password" name="password" required placeholder="••••••••" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm pr-12">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 hover:text-indigo-600 transition">
                        <i id="eye-icon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Confirm Password</label>
                <input type="password" name="confirmPassword" required placeholder="••••••••" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm">
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 mt-2">
                Reset Password
            </button>
        </form>

        <p id="reset-error" class="text-red-500 text-sm font-bold text-center mt-2 hidden"></p>
        <p id="reset-success" class="text-green-500 text-sm font-bold text-center mt-2 hidden"></p>

        <div class="mt-6 text-center">
            <a href="auth.html" class="text-gray-300 text-[9px] font-black uppercase tracking-tighter hover:text-gray-500 transition">
                <i class="fa-solid fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resetForm = document.getElementById('reset-password-form');
            const resetError = document.getElementById('reset-error');
            const resetSuccess = document.getElementById('reset-success');

            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                resetError.innerText = 'Invalid reset link';
                resetError.classList.remove('hidden');
                return;
            }

            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                resetError.classList.add('hidden');
                resetSuccess.classList.add('hidden');

                const formData = new FormData(resetForm);
                const data = Object.fromEntries(formData.entries());

                if (data.password !== data.confirmPassword) {
                    resetError.innerText = 'Passwords do not match';
                    resetError.classList.remove('hidden');
                    return;
                }

                const policy = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]).{8,}$/;
                if (!policy.test(data.password)) {
                    resetError.innerText = 'Password must be at least 8 chars and include uppercase, lowercase, number, symbol';
                    resetError.classList.remove('hidden');
                    return;
                }

                try {
                    const response = await fetch('/api/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, password: data.password })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        resetSuccess.innerText = 'Password reset successfully! Redirecting...';
                        resetSuccess.classList.remove('hidden');
                        setTimeout(() => {
                            window.location.href = 'auth.html';
                        }, 2000);
                    } else {
                        resetError.innerText = result.error || 'Failed to reset password';
                        resetError.classList.remove('hidden');
                    }
                } catch (err) {
                    console.error('Reset Password Error:', err);
                    resetError.innerText = 'Connection issue, try again.';
                    resetError.classList.remove('hidden');
                } finally {
                    window.hidePageLoader && window.hidePageLoader();
                }
            });
        });

        // Password Toggle
        window.togglePassword = function() {
            const passwordInput = document.querySelector('input[name="password"]');
            const eyeIcon = document.getElementById('eye-icon');
            if (passwordInput && eyeIcon) {
                const isPass = passwordInput.type === 'password';
                passwordInput.type = isPass ? 'text' : 'password';
                eyeIcon.className = isPass ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
            }
        };
    </script>
    <script src="page-loader.js"></script>
</body>
</html>
