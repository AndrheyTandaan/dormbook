<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel | DormBook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { 
            scroll-behavior: smooth; 
            overflow-y: scroll; 
            scrollbar-gutter: stable; 
        }
        body { 
            min-height: 100vh;
            height: auto !important;
            overflow-y: auto !important; 
            scrollbar-gutter: stable; 
            background-color: #f9fafb;
        }

        .dropdown-menu {
            display: none;
            transform-origin: top;
            animation: slideIn 0.2s ease-out;
        }
        .dropdown-menu.show { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        #sidebar-drawer {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .mobile-only { display: flex !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="fixed top-0 left-0 right-0 flex justify-between items-center px-8 py-4 bg-white/80 backdrop-blur-md border-b z-50 min-h-16">
        <div class="text-xl font-bold flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-building-circle-check text-indigo-600"></i>
            DormBook
        </div>
        <div id="nav-center" class="absolute left-1/2 transform -translate-x-1/2 hidden md:flex gap-8 items-center justify-center"></div>
        <div id="nav-right" class="flex justify-end items-center gap-4"></div>
    </nav>

    <div class="pt-20"></div>
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[60] opacity-0 pointer-events-none transition-opacity duration-300"></div>
    
    <div id="sidebar-drawer" class="fixed top-0 right-0 h-full w-80 bg-white z-[70] shadow-2xl transform translate-x-full p-8 flex flex-col overflow-hidden">
        <div class="flex justify-between items-center mb-8">
            <span class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Account</span>
            <div class="flex gap-2">
                <button onclick="toggleSidebar()" class="w-12 h-12 flex flex-col items-center justify-center bg-gray-100 rounded-2xl border hover:bg-gray-200 transition">
                    <i class="fa-solid fa-xmark text-gray-500"></i>
                </button>
            </div>
        </div>
        <div id="sidebar-profile-box" class="mb-10"></div>
        <div id="sidebar-links" class="space-y-2 flex-grow overflow-y-auto pr-2"></div>
        <button onclick="logout()" class="w-full bg-red-50 text-red-600 py-4 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-red-100 transition flex items-center justify-center gap-2">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
    </div>

    <div class="max-w-7xl mx-auto px-8">
        <div class="flex justify-between items-end py-10">
            <div>
                <h1 class="text-4xl font-black mb-2 tracking-tight uppercase">Admin Panel</h1>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Add and manage dormitory listings</p>
            </div>
            <div class="flex gap-4">
                <button onclick="window.location.reload()" class="bg-white border border-gray-200 px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-gray-50 transition shadow-sm">
                    <i class="fa-solid fa-rotate mr-2 text-indigo-600"></i> Refresh
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 pb-20 items-start justify-center">
            <div class="lg:col-span-6">
                <div id="add-dorm-form-container" class="bg-white rounded-[2.5rem] p-8 shadow-xl shadow-gray-200/50 border border-gray-100 transition-all duration-700">
                    <h2 class="text-xl font-black mb-6 flex items-center gap-2 text-gray-800 uppercase tracking-tighter">
                        <i class="fa-solid fa-circle-plus mr-2 text-sm text-indigo-500"></i> Add New Room
                    </h2>
                    <form id="add-dorm-form" class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Room Name/Number</label>
                            <input type="text" name="name" id="name" placeholder="e.g. 123/Eliazo Hall" required class="w-full px-5 py-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 border-none text-sm font-medium">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Price (Monthly)</label>
                                <input type="number" name="price" id="price" placeholder="5000" required class="w-full px-5 py-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 border-none text-sm font-medium">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Location</label>
                                <input type="text" name="location" id="location" placeholder="Freedom" required class="w-full px-5 py-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 border-none text-sm font-medium">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Room Type / Capacity</label>
                            <select name="room_type" id="room_type" required class="w-full px-5 py-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 border-none text-sm font-medium appearance-none">
                                <option value="" disabled selected>Select room capacity...</option>
                                <option value="Single (1 Person)">Single Bed (1 Person)</option>
                                <option value="Double (2 Persons)">2 Beds (2 Person Sharing)</option>
                                <option value="Triple (3 Persons)">3 Beds (3 Person Sharing)</option>
                                <option value="Quad/Bedspacer (4 Persons)">4 Beds (Bedspacer - 4 Persons)</option>
                            </select>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Description</label>
                            <textarea name="description" id="description" placeholder="Describe the vibe, rules, etc..." rows="3" required class="w-full px-5 py-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 border-none text-sm resize-none font-medium"></textarea>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Image URL</label>
                            <input type="url" name="image_url" id="image_url" placeholder="https://images.unsplash.com/..." required class="w-full px-5 py-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 border-none text-sm font-medium">
                        </div>

                        <button type="submit" id="submit-btn" class="w-full bg-black text-white py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-indigo-600 transition shadow-lg mt-2">
                            Add Room
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-6">
                <div class="sticky top-28 space-y-4">
                    <div class="flex justify-between items-center px-4">
                        <span class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Live Preview</span>
                        <span class="bg-indigo-100 text-indigo-600 text-[9px] font-black px-2 py-1 rounded uppercase">Student View</span>
                    </div>
                    <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-2xl border border-gray-100 transition-all duration-300">
                        <div class="h-64 bg-gray-200 relative overflow-hidden">
                            <img id="preview-img" src="https://images.unsplash.com/photo-1555854877-bab0e564b8d5?q=80&w=1000" class="w-full h-full object-cover">
                            <div class="absolute top-4 left-4 flex gap-2">
                                <div class="bg-white/90 backdrop-blur px-3 py-1 rounded-xl shadow-sm">
                                    <p id="preview-price" class="text-xs font-black text-gray-900">₱0</p>
                                </div>
                                <div id="preview-type-badge" class="hidden bg-indigo-600/90 backdrop-blur px-3 py-1 rounded-xl shadow-sm">
                                    <p id="preview-type-text" class="text-[9px] font-black text-white uppercase"></p>
                                </div>
                            </div>
                        </div>
                        <div class="p-8 space-y-4">
                            <h3 id="preview-title" class="font-black text-xl uppercase tracking-tight text-gray-800">Dorm Name</h3>
                            <p id="preview-loc" class="text-xs font-bold text-indigo-500 uppercase"><i class="fa-solid fa-location-dot mr-1"></i> Location</p>
                            <p id="preview-desc" class="text-gray-400 text-sm leading-relaxed italic">Preview description...</p>
                            <div class="pt-6 border-t border-gray-50 flex justify-between items-center">
                                <span class="text-[9px] font-black uppercase text-gray-400 tracking-widest italic">Draft Version</span>
                                <div class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-gray-300">
                                    <i class="fa-solid fa-eye"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setupNavbar();
            setupPreview();
            setupFormSubmission(); 
        });

        function setupFormSubmission() {
            const form = document.getElementById('add-dorm-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const user = JSON.parse(localStorage.getItem('user'));
                const adminName = user ? user.name : 'Admin';

                const roomData = {
                    name: document.getElementById('name').value,
                    price: document.getElementById('price').value,
                    location: document.getElementById('location').value,
                    room_type: document.getElementById('room_type').value, // Captured Room Type
                    description: document.getElementById('description').value,
                    image_url: document.getElementById('image_url').value,
                    adminName: adminName
                };

                try {
                    window.showPageLoader();
                    const response = await fetch('/api/dorms', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(roomData)
                    });

                    if (response.ok) {
                        alert("Room added successfully!");
                        window.location.href = 'management.html#inventory-section';
                    } else {
                        window.hidePageLoader();
                        const errorData = await response.json();
                        alert("Error: " + (errorData.error || "Failed to save room"));
                    }
                } catch (err) {
                    window.hidePageLoader();
                    console.error("Backend connection error:", err);
                    alert("Could not connect to the server.");
                }
            });
        }

        function setupNavbar() {
            const user = JSON.parse(localStorage.getItem('user'));
            const navCenter = document.getElementById('nav-center');
            const navRight = document.getElementById('nav-right');
            const sidebarProfile = document.getElementById('sidebar-profile-box');
            const sidebarLinks = document.getElementById('sidebar-links');

            if (!user || user.role !== 'admin') {
                window.location.href = 'index.html'; 
                return;
            }

            navCenter.innerHTML = `
                <div class="flex items-center gap-8">
                    <a href="index.html" class="text-xs font-black text-gray-500 uppercase tracking-widest hover:text-indigo-600 transition-all">Home</a>
                    <div class="relative">
                        <button onclick="toggleDropdown(event, 'management-dropdown')" class="text-xs font-black text-gray-500 uppercase tracking-widest hover:text-indigo-600 transition-all flex items-center gap-2">
                            Management <i class="fa-solid fa-chevron-down text-[10px]"></i>
                        </button>
                        <div id="management-dropdown" class="dropdown-menu absolute top-full left-0 mt-2 w-64 bg-white rounded-2xl shadow-xl border border-gray-100 py-2 z-50 text-left overflow-hidden">
                            <a href="management.html#pending-section" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition border-b border-gray-50">
                                <i class="fa-solid fa-envelope-open-text mr-2 text-indigo-500"></i> Pending Requests
                            </a>
                            <a href="management.html#due-dates-section" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition border-b border-gray-50">
                                <i class="fa-solid fa-calendar-day mr-2 text-indigo-500"></i> Resident Due Dates
                            </a>
                            <a href="management.html#inventory-section" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition">
                                <i class="fa-solid fa-door-open mr-2 text-indigo-500"></i> Room Inventory
                            </a>
                        </div>
                    </div>
                    <div class="relative">
                        <button onclick="toggleDropdown(event, 'panel-dropdown')" class="text-xs font-black text-indigo-600 uppercase tracking-widest flex items-center gap-2">
                            Panel <i class="fa-solid fa-chevron-down text-[10px]"></i>
                        </button>
                        <div id="panel-dropdown" class="dropdown-menu absolute top-full left-0 mt-2 w-64 bg-white rounded-2xl shadow-xl border border-gray-100 py-2 z-50 text-left overflow-hidden">
                            <a href="#add-dorm-form-container" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition border-b border-gray-50">
                                <i class="fa-solid fa-circle-plus mr-2 text-sm text-indigo-500"></i> Add New Room
                            </a>
                            <a href="users.html" class="block px-5 py-4 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition">
                                <i class="fa-solid fa-users-gear mr-2 text-sm text-indigo-500"></i> User Management
                            </a>
                        </div>
                    </div>
                    <a href="book_history.html" class="text-xs font-black text-gray-500 uppercase tracking-widest hover:text-indigo-600">History</a>
                </div>
            `;

            sidebarLinks.innerHTML = `
                <a href="index.html" class="flex items-center gap-4 p-4 rounded-2xl text-xs font-black uppercase tracking-widest text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 transition">
                    <i class="fa-solid fa-house"></i> Home
                </a>

                <div class="relative">
                    <button onclick="toggleDropdown(event, 'sidebar-management')" class="w-full flex justify-between items-center p-4 rounded-2xl text-xs font-black uppercase tracking-widest text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 transition">
                        <span class="flex items-center gap-4"><i class="fa-solid fa-list-check w-4"></i> Management</span>
                        <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </button>
                    <div id="sidebar-management" class="dropdown-menu w-full bg-white rounded-2xl shadow-sm border border-gray-100 py-2 mt-1 overflow-hidden">
                        <a href="management.html#pending-section" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition border-b border-gray-50">
                            <i class="fa-solid fa-envelope-open-text mr-2 text-indigo-500"></i> Pending Requests
                        </a>
                        <a href="management.html#due-dates-section" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition border-b border-gray-50">
                            <i class="fa-solid fa-calendar-day mr-2 text-indigo-500"></i> Resident Due Dates
                        </a>
                        <a href="management.html#inventory-section" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition">
                            <i class="fa-solid fa-door-open mr-2 text-indigo-500"></i> Room Inventory
                        </a>
                    </div>
                </div>

                <div class="relative">
                    <button onclick="toggleDropdown(event, 'sidebar-panel')" class="w-full flex justify-between items-center p-4 rounded-2xl text-xs font-black uppercase tracking-widest text-indigo-600 bg-indigo-50 transition">
                        <span class="flex items-center gap-4"><i class="fa-solid fa-sliders w-4"></i> Panel</span>
                        <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </button>
                    <div id="sidebar-panel" class="dropdown-menu w-full bg-white rounded-2xl shadow-sm border border-gray-100 py-2 mt-1 overflow-hidden">
                        <a href="admin_panel.html" class="block px-5 py-3 text-[10px] font-black uppercase text-indigo-600 bg-indigo-50 border-b border-gray-50">
                            <i class="fa-solid fa-circle-plus mr-2 text-sm text-indigo-500"></i> Add New Room
                        </a>
                        <a href="users.html" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition">
                            <i class="fa-solid fa-users-gear mr-2 text-sm text-indigo-500"></i> User Management
                        </a>
                    </div>
                </div>

                <a href="book_history.html" class="flex items-center gap-4 p-4 rounded-2xl text-xs font-black uppercase tracking-widest text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 transition">
                    <i class="fa-solid fa-clock-rotate-left"></i> History
                </a>
            `;

            navRight.innerHTML = `
                <button onclick="toggleSidebar()" class="mobile-only w-12 h-12 flex flex-col items-center justify-center bg-gray-100 rounded-2xl border border-gray-200 hover:bg-gray-200 transition">
                    <div class="w-6 h-0.5 bg-gray-800 mb-1"></div>
                    <div class="w-6 h-0.5 bg-gray-800 mb-1"></div>
                    <div class="w-6 h-0.5 bg-gray-800"></div>
                </button>
            `;

            sidebarProfile.innerHTML = `
                <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-[2rem] border border-gray-100 cursor-pointer hover:bg-gray-100 transition" onclick="window.location.href='profile.html'">
                    <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white"><i class="fa-solid fa-user-shield"></i></div>
                    <div class="text-left flex-grow">
                        <p class="text-[9px] font-black text-indigo-500 uppercase">ADMIN</p>
                        <p class="text-sm font-bold text-gray-800">${user.name}</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-400 text-sm"></i>
                </div>
            `;
        }

        function toggleSidebar() {
            document.getElementById('sidebar-drawer').classList.toggle('translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }

        function setupPreview() {
            ['name', 'price', 'location', 'description', 'image_url', 'room_type'].forEach(id => {
                document.getElementById(id).addEventListener('input', updatePreview);
            });
        }

        function updatePreview() {
            document.getElementById('preview-title').innerText = document.getElementById('name').value || "Dorm Name";
            document.getElementById('preview-price').innerText = "₱" + (document.getElementById('price').value || "0");
            document.getElementById('preview-loc').innerHTML = `<i class="fa-solid fa-location-dot mr-1"></i> ${document.getElementById('location').value || "Location"}`;
            document.getElementById('preview-desc').innerText = document.getElementById('description').value || "Preview description...";
            
            // Preview Image
            const imgUrl = document.getElementById('image_url').value;
            if(imgUrl) document.getElementById('preview-img').src = imgUrl;

            // Room Type Badge Preview
            const roomType = document.getElementById('room_type').value;
            const badge = document.getElementById('preview-type-badge');
            if(roomType) {
                badge.classList.remove('hidden');
                document.getElementById('preview-type-text').innerText = roomType;
            } else {
                badge.classList.add('hidden');
            }
        }

        function toggleDropdown(e, id) {
            e.stopPropagation();
            const target = document.getElementById(id);
            document.querySelectorAll('.dropdown-menu').forEach(m => m !== target && m.classList.remove('show'));
            target.classList.toggle('show');
        }

        window.onclick = () => document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
        function logout() { localStorage.removeItem('user'); window.location.href = 'auth.html'; }
    </script>
    <script src="page-loader.js"></script>
</body>
</html>
