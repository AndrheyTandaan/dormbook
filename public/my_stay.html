<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stay | DormBook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #f9fafb; min-height: 100vh; overflow-y: auto !important; }
        section { scroll-margin-top: 100px; }

        .section-card {
            background: white;
            border-radius: 3rem;
            border: 1px solid #f1f5f9;
            padding: 3rem;
            margin-bottom: 3rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .dropdown-menu {
            display: none;
            transform-origin: top;
            animation: slideIn 0.2s ease-out;
        }
        .dropdown-menu.show { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        #sidebar-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #sidebar-overlay.active { opacity: 1; pointer-events: auto; }

        .mobile-only { display: flex !important; }
    </style>
</head>
<body class="text-gray-900">

    </nav>

    <div class="pt-20"></div>

    <div id="sidebar-drawer" class="fixed top-0 right-0 h-full w-80 bg-white z-[70] shadow-2xl transform translate-x-full p-8 flex flex-col overflow-hidden">
        <div class="flex justify-between items-center mb-8">
            <span class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Account</span>
            <div class="flex gap-2">
                <button onclick="toggleSidebar()" class="w-12 h-12 flex flex-col items-center justify-center bg-gray-100 rounded-2xl border hover:bg-gray-200 transition">

        <button onclick="logout()" class="w-full bg-red-50 text-red-600 py-4 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-red-100 transition flex items-center justify-center gap-2">
            <i class="fa-solid fa-right-from-bracket"></i> Logout

    </div>

    <main class="max-w-5xl mx-auto px-8 py-12">
        <header class="mb-16">
            <h1 class="text-5xl font-black uppercase tracking-tight italic">My Stay</h1>
        </header>

        <section id="bookings" class="section-card">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center">

    <!-- Refund Request Modal -->
    <div id="refund-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">

            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-black text-gray-900">Request Refund</h2>
                <button onclick="closeRefundModal()" class="text-gray-400 hover:text-gray-700"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="refund-form">
                <input type="hidden" id="refund-booking-id" />
                <input type="hidden" id="refund-room-name" />
                <div class="mb-4">
                    <label class="block text-xs font-black uppercase text-gray-500 mb-1" for="refund-full-name">Full name</label>
                    <input type="text" id="refund-full-name" class="w-full border border-gray-200 rounded-xl px-4 py-3" required />
                </div>
                <div class="mb-4">
                    <label class="block text-xs font-black uppercase text-gray-500 mb-1" for="refund-contact-number">Number</label>
                    <input type="tel" id="refund-contact-number" class="w-full border border-gray-200 rounded-xl px-4 py-3" required />
                </div>
                <div class="mb-6">
                    <label class="block text-xs font-black uppercase text-gray-500 mb-1" for="refund-room-display">Booked room</label>
                    <input type="text" id="refund-room-display" class="w-full border border-gray-200 rounded-xl px-4 py-3 bg-gray-100" readonly />
                </div>
                <div class="mb-6">
                    <label class="block text-xs font-black uppercase text-gray-500 mb-1" for="refund-amount-display">Refund amount</label>
                    <input type="text" id="refund-amount-display" class="w-full border border-gray-200 rounded-xl px-4 py-3 bg-gray-100" readonly />
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="closeRefundModal()" class="px-4 py-2 rounded-xl bg-gray-100 text-gray-700 font-black uppercase text-xs">Cancel</button>
                    <button type="button" onclick="submitRefundRequest()" class="px-4 py-2 rounded-xl bg-indigo-600 text-white font-black uppercase text-xs">Submit Request</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const userCheck = localStorage.getItem('user');

        function getCapacity(roomType) {
            if (!roomType) return 1;
            const type = roomType.toLowerCase();
            if (type.includes('single') || type.includes('1 person')) return 1;
            if (type.includes('double') || type.includes('2 person')) return 2;
            if (type.includes('triple') || type.includes('3 person')) return 3;
            if (type.includes('quad') || type.includes('4 person')) return 4;
            return 1; // Default
        }

        function formatRoomType(roomType) {
            if (!roomType) return 'Standard Room';
            const capacity = getCapacity(roomType);
            const personText = capacity === 1 ? 'person' : 'persons';
            
            // Extract the room type name without the capacity info
            const type = roomType.toLowerCase();
            let typeLabel = 'Standard';
            
            if (type.includes('single')) {
                typeLabel = 'Single';
            } else if (type.includes('double')) {
                typeLabel = 'Double';
            } else if (type.includes('triple')) {
                typeLabel = 'Triple';
            } else if (type.includes('quad')) {
                typeLabel = 'Quad';
            } else {
                // Use the original room type if it doesn't match known types
                typeLabel = roomType;
            }
            
            return `${typeLabel} (${capacity} ${personText})`;
        }

        let myStaySocket = null;

        function setupRealtimeMyStay(user) {
            if (typeof io === 'undefined') {
                console.warn('Socket.IO not loaded');
                return;
            }
            myStaySocket = io();
            myStaySocket.on('connect', () => console.info('my_stay socket connected', myStaySocket.id));
            myStaySocket.on('bookings:updated', () => loadUserData(user));
            myStaySocket.on('users:updated', () => loadUserData(user));
            myStaySocket.on('dorms:updated', () => loadUserData(user));
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(userCheck);
            if(!user) {
                window.location.href = 'auth.html';
                return;
            }
            setupNavbar();
            setupRealtimeMyStay(user);
            window.showPageLoader();
            await loadUserData(user);
            window.hidePageLoader();
        });

        function setupNavbar() {
            const user = JSON.parse(userCheck);
            const navCenter = document.getElementById('nav-center');
            const navRight = document.getElementById('nav-right');

            navCenter.innerHTML = `
                <div class="flex items-center gap-8">
                    <a href="index.html" class="text-xs font-black text-gray-500 hover:text-indigo-600 uppercase tracking-widest transition-all">Home</a>
                    <div class="relative">
                        <button onclick="toggleDropdown(event, 'user-stay-dropdown')" class="text-xs font-black text-indigo-600 uppercase tracking-widest flex items-center gap-2">
                            My Stay <i class="fa-solid fa-chevron-down text-[10px]"></i>
                        </button>
                        <div id="user-stay-dropdown" class="dropdown-menu absolute top-full left-0 mt-2 w-64 bg-white rounded-2xl shadow-xl border border-gray-100 py-2 z-50 overflow-hidden">
                            <a href="#bookings" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition border-b border-gray-50">
                                <i class="fa-solid fa-bed mr-2 text-indigo-500"></i> Bookings
                            </a>
                            <a href="#balances" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition border-b border-gray-50">
                                <i class="fa-solid fa-wallet mr-2 text-indigo-500"></i> Balances
                            </a>
                            <a href="#due-dates" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition border-b border-gray-50">
                                <i class="fa-solid fa-calendar-check mr-2 text-indigo-500"></i> Due Dates
                            </a>
                            <a href="#refund-history" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition">
                                <i class="fa-solid fa-money-bill-transfer mr-2 text-indigo-500"></i> Refunds
                            </a>
                        </div>
                    </div>
                    <a href="book_history.html" class="text-xs font-black text-gray-500 uppercase tracking-widest hover:text-indigo-600 transition">History</a>
                </div>`;

            navRight.innerHTML = `
                ${user.role !== 'admin' ? `
                <div class="relative hidden md:block">
                    <button onclick="toggleDropdown(event, 'notif-dropdown')" class="w-12 h-12 flex items-center justify-center bg-gray-100 rounded-2xl border border-gray-200 hover:bg-gray-200 transition relative">
                        <i class="fa-solid fa-bell text-gray-600"></i>
                        <span id="notif-badge" class="hidden absolute top-3.5 right-4 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                    <div id="notif-dropdown" class="dropdown-menu absolute top-full right-0 mt-2 w-80 bg-white rounded-[2rem] shadow-2xl border border-gray-100 py-4 z-50 overflow-hidden text-left">
                        <div class="px-6 py-2 border-b border-gray-50 mb-2">
                            <span class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Notifications</span>
                        </div>
                        <div id="notif-items" class="max-h-96 overflow-y-auto px-4 space-y-2">
                            <p class="py-10 text-[10px] font-bold text-gray-400 uppercase italic text-center">No new alerts</p>
                        </div>
                    </div>
                </div>
                ` : ''}

                <button onclick="toggleSidebar()" class="mobile-only w-12 h-12 flex flex-col items-center justify-center bg-gray-100 rounded-2xl border border-gray-200 hover:bg-gray-200 transition">
                    <div class="w-6 h-0.5 bg-gray-800 mb-1"></div>
                    <div class="w-6 h-0.5 bg-gray-800 mb-1"></div>
                    <div class="w-6 h-0.5 bg-gray-800"></div>
                </button>
            `;

            document.getElementById('sidebar-profile-box').innerHTML = `
                <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-[2rem] border">
                    <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white font-bold">${user.name.charAt(0)}</div>
                    <div class="text-left flex-grow">
                        <p class="text-[9px] font-black text-indigo-500 uppercase leading-none">${user.role}</p>
                        <p class="text-sm font-bold text-gray-800">${user.name}</p>
                    </div>
                </div>`;
            
            document.getElementById('sidebar-links').innerHTML = `
                <a href="index.html" class="flex items-center gap-4 p-4 rounded-2xl text-xs font-black uppercase tracking-widest text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 transition">
                    <i class="fa-solid fa-house"></i> Home
                </a>
                ${user.role !== 'admin' ? `
                    <div class="relative">
                        <button onclick="toggleDropdown(event, 'sidebar-mystay-dropdown')" class="w-full flex justify-between items-center gap-4 p-4 rounded-2xl text-xs font-black uppercase tracking-widest text-indigo-600 bg-indigo-50 hover:bg-indigo-100 transition">
                            <span class="flex items-center gap-4"><i class="fa-solid fa-house-user"></i> My Stay</span>
                            <i class="fa-solid fa-chevron-down text-[10px]"></i>
                        </button>
                        <div id="sidebar-mystay-dropdown" class="dropdown-menu w-full bg-white rounded-2xl shadow-sm border border-gray-100 py-2 mt-1 overflow-hidden p-0">
                            <a href="#bookings" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition">
                                <i class="fa-solid fa-bed mr-2 text-indigo-500"></i> Bookings
                            </a>
                            <a href="#balances" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition">
                                <i class="fa-solid fa-wallet mr-2 text-indigo-500"></i> Balances
                            </a>
                            <a href="#due-dates" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition">
                                <i class="fa-solid fa-calendar-days mr-2 text-indigo-500"></i> Due Dates
                            </a>
                            <a href="#refund-history" class="block px-5 py-3 text-[10px] font-black uppercase text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition">
                                <i class="fa-solid fa-money-bill-transfer mr-2 text-indigo-500"></i> Refunds
                            </a>
                        </div>
                    </div>
                ` : ''}
                <a href="book_history.html" class="flex items-center gap-4 p-4 rounded-2xl text-xs font-black uppercase tracking-widest text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 transition">
                    <i class="fa-solid fa-clock-rotate-left"></i> History
                </a>
                `;
        }

        async function loadUserData(user) {
            const bookingContainer = document.getElementById('booking-list-container');
            const balanceContainer = document.getElementById('balance-list-container');
            const dueContainer = document.getElementById('due-date-container');

            try {
                const res = await fetch('/api/admin/bookings?t=' + Date.now());
                const allBookings = await res.json();

                const roomsRes = await fetch('/api/rooms?t=' + Date.now());
                const rooms = await roomsRes.json();
                const roomMap = {};
                const priceMap = {};
                rooms.forEach(r => {
                    const nameKey = (r.name || '').toLowerCase().trim();
                    roomMap[r.name] = getCapacity(r.room_type);
                    roomMap[nameKey] = getCapacity(r.room_type); // Case-insensitive and trimmed fallback
                    priceMap[r.name] = parseFloat(r.price) || 0;
                    priceMap[nameKey] = parseFloat(r.price) || 0; // Case-insensitive and trimmed fallback
                });

                // Store roomsData in sessionStorage for use in showBookingDetails
                sessionStorage.setItem('roomsData', JSON.stringify(rooms));

                console.log('Rooms data:', rooms);
                console.log('Price map:', priceMap);

                const roomCounts = {};
                allBookings.filter(b => b.status === 'Approved').forEach(b => {
                    const roomName = (b.room_name || '').toLowerCase().trim();
                    roomCounts[roomName] = (roomCounts[roomName] || 0) + 1;
                });

                const myStays = allBookings.filter(b => b.user_name === user.name && b.status === 'Approved');
                
                // Store user bookings in sessionStorage
                sessionStorage.setItem('userBookings', JSON.stringify(myStays));
                
                // Run notifications check
                checkDueAlerts(myStays);

                if (myStays.length === 0) {
                    const empty = `<div class="p-10 text-center opacity-30 text-[10px] font-black uppercase italic">No active residency records found</div>`;
                    bookingContainer.innerHTML = empty;
                    balanceContainer.innerHTML = empty;
                    dueContainer.innerHTML = empty;
                    return;
                }

                // 1. Render Bookings
                bookingContainer.innerHTML = myStays.map(stay => {
                    const roomNameKey = (stay.room_name || '').toLowerCase().trim();
                    const isFull = (roomCounts[roomNameKey] || 0) >= (roomMap[roomNameKey] || 1);
                    const status = isFull ? 'Booked' : 'Available';
                    const statusClass = isFull ? 'bg-blue-100 text-blue-600' : 'bg-green-100 text-green-600';
                    const safeData = JSON.stringify(stay).replace(/"/g, '&quot;').replace(/'/g, "\\'");

                    const refundAction = stay.refund_requested ?
                        `<span class="px-3 py-1 rounded-xl text-[10px] font-black uppercase tracking-widest bg-indigo-100 text-indigo-700"><i class="fa-solid fa-clock"></i> Refund Pending</span>` :
                        `<button onclick="event.stopPropagation(); openRefundModal(${safeData})" class="px-3 py-2 bg-red-50 text-red-600 rounded-xl text-[10px] font-black uppercase hover:bg-red-100 transition flex items-center gap-2"><i class="fa-solid fa-money-bill-transfer"></i>Request Refund</button>`;

                    return `
                        <div class="flex justify-between items-center p-6 bg-gray-50 rounded-2xl border border-gray-100 shadow-sm cursor-pointer hover:bg-gray-100 transition">
                            <div onclick="showBookingDetails(${safeData})" class="cursor-pointer">
                                <p class="text-[10px] font-black text-indigo-600 uppercase mb-1">Stay Details</p>
                                <h4 class="text-lg font-bold">${stay.room_name}</h4>
                                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest italic">Booking ID: #${stay.id}</p>
                            </div>
                            <div class="flex flex-col items-end gap-2">
                                <span class="px-4 py-1 ${statusClass} text-[10px] font-black rounded-full uppercase">${status}</span>
                                ${refundAction}
                            </div>
                        </div>
                    `;
                }).join('');

                // 2. Render Balances
                balanceContainer.innerHTML = myStays.map(stay => {
                    // Try exact match first, then case-insensitive
                    let monthlyPrice = priceMap[stay.room_name] || 0;
                    if (monthlyPrice === 0 && stay.room_name) {
                        monthlyPrice = priceMap[stay.room_name.toLowerCase()] || 0;
                    }
                    
                    // If still no price found, try to find a room with similar name
                    if (monthlyPrice === 0) {
                        const roomNames = Object.keys(priceMap);
                        const similarRoom = roomNames.find(name => 
                            stay.room_name.toLowerCase().includes(name.toLowerCase()) || 
                            name.toLowerCase().includes(stay.room_name.toLowerCase())
                        );
                        if (similarRoom) {
                            monthlyPrice = priceMap[similarRoom];
                            console.log('Found similar room:', similarRoom, 'for booking:', stay.room_name);
                        }
                    }
                    
                    const months = parseInt(stay.duration) || 1;
                    const totalContract = monthlyPrice * months;
                    const paid = parseFloat(stay.amount_paid) || 0; 
                    const remaining = totalContract - paid;

                    console.log('Stay:', stay.room_name, 'Price:', monthlyPrice, 'Paid:', paid, 'Remaining:', remaining, 'Total Contract:', totalContract);

                    return `
                        <div class="flex justify-between items-center p-6 bg-gray-50 rounded-2xl border border-gray-100 shadow-sm">
                            <div>
                                <p class="text-[10px] font-black text-emerald-600 uppercase mb-1">Current Balance</p>
                                <h4 class="text-2xl font-black">₱${remaining.toLocaleString()}</h4>
                                <p class="text-[9px] text-gray-400 font-bold uppercase mt-1">Total: ₱${monthlyPrice.toLocaleString()} | Paid: ₱${paid.toLocaleString()}</p>
                            </div>
                        </div>
                    `;
                }).join('');

                // 3. Render Due Dates
                dueContainer.innerHTML = myStays.map(stay => {
                    const moveInDate = new Date(stay.start_date);
                    const dueDate = new Date(moveInDate);
                    dueDate.setMonth(moveInDate.getMonth() + 1);
                    dueDate.setHours(0, 0, 0, 0);

                    const formattedDate = dueDate.toLocaleDateString('en-PH', { 
                        month: 'long', 
                        day: 'numeric', 
                        year: 'numeric' 
                    });

                    return `
                        <div class="flex justify-between items-center p-6 bg-gray-50 rounded-2xl border border-gray-100 shadow-sm">
                            <div>
                                <p class="text-[10px] font-black text-amber-600 uppercase mb-1">Next Payment Due</p>
                                <h4 class="text-lg font-bold">${formattedDate}</h4>
                                <p class="text-[9px] text-gray-400 font-bold uppercase mt-1 italic">PST (Philippine Standard Time)</p>
                            </div>
                            <div class="w-10 h-10 flex items-center justify-center bg-white rounded-full text-amber-500 shadow-sm">
                                <i class="fa-solid fa-clock"></i>
                            </div>
                        </div>
                    `;
                }).join('');

                // 4. Render Refund History
                await loadRefundHistory(user);

            } catch (err) {
                console.error("Connection error:", err);
            }
        }

        async function loadRefundHistory(user) {
            const refundContainer = document.getElementById('refund-history-container');
            
            try {
                const res = await fetch(`/api/refund/history/${user.id}?t=${Date.now()}`);
                const refunds = await res.json();

                if (!refunds || refunds.length === 0) {
                    refundContainer.innerHTML = `<div class="p-10 text-center opacity-30 text-[10px] font-black uppercase italic">No refund requests yet</div>`;
                    return;
                }

                refundContainer.innerHTML = refunds.map(refund => {
                    const statusStyles = refund.status === 'Approved' ? 'bg-green-100 text-green-700' : (refund.status === 'Rejected' ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-700');
                    const statusIcon = refund.status === 'Approved' ? '<i class="fa-solid fa-circle-check mr-1"></i>' : (refund.status === 'Rejected' ? '<i class="fa-solid fa-xmark-circle mr-1"></i>' : '<i class="fa-solid fa-clock mr-1"></i>');
                    
                    const requestDate = new Date(refund.created_at).toLocaleDateString('en-PH', { 
                        month: 'short', 
                        day: 'numeric', 
                        year: 'numeric' 
                    });

                    const transactionInfo = refund.transaction_id ? 
                        `<p class="text-[9px] text-gray-400 font-bold uppercase mt-1">Transaction ID: <span class="font-black text-gray-600">${refund.transaction_id}</span></p>` : 
                        '';

                    return `
                        <div class="flex justify-between items-center p-6 bg-gray-50 rounded-2xl border border-gray-100 shadow-sm">
                            <div>
                                <p class="text-[10px] font-black text-purple-600 uppercase mb-1">Refund Request - ${refund.room_name}</p>
                                <h4 class="text-lg font-bold">₱${(parseFloat(refund.refund_amount) || 0).toLocaleString()}</h4>
                                <p class="text-[9px] text-gray-400 font-bold uppercase mt-1">Requested: ${requestDate}</p>
                                ${transactionInfo}
                            </div>
                            <span class="px-3 py-1 rounded-xl text-[10px] font-black uppercase ${statusStyles}">${statusIcon}${refund.status}</span>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Error loading refund history:', err);
                refundContainer.innerHTML = `<div class="p-10 text-center opacity-30 text-[10px] font-black uppercase italic">Error loading refund history</div>`;
            }
        }

        function markBadgeAsViewed() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.id) return;
            fetch(`/api/users/${user.id}/notif-badge-viewed`, { method: 'PATCH' })
                .catch(err => console.warn('Could not update badge viewed status:', err));
        }

        async function isBadgeViewed() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.id) return false;
            try {
                const res = await fetch(`/api/users/${user.id}/notif-badge-status?t=${Date.now()}`);
                if (res.ok) {
                    const data = await res.json();
                    return !data.unread;
                }
            } catch (err) {
                console.warn('Could not check badge status:', err);
            }
            return false;
        }

        function dismissAlert(roomName) {
            const dismissedRooms = JSON.parse(localStorage.getItem('dismissed-alert-rooms') || '[]');
            if (!dismissedRooms.includes(roomName)) {
                dismissedRooms.push(roomName);
                localStorage.setItem('dismissed-alert-rooms', JSON.stringify(dismissedRooms));
            }
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const userBookingsRes = JSON.parse(sessionStorage.getItem('userBookings') || '[]');
            checkDueAlerts(userBookingsRes);
        }

        function showBookingDetails(booking) {
            // Get room type and price from rooms data
            const roomsRes = JSON.parse(sessionStorage.getItem('roomsData') || '[]');
            const roomData = roomsRes.find(r => r.name === booking.room_name);
            const roomType = booking.room_type || (roomData ? roomData.room_type : 'Standard Room');
            const formattedRoomType = formatRoomType(roomType);
            const roomPrice = roomData ? parseFloat(roomData.price) || 0 : parseFloat(booking.price) || 0;
            
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4';
            modal.onclick = function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            };
            modal.innerHTML = `
                <div class="bg-white rounded-[2rem] shadow-2xl max-w-md w-full max-h-[90vh] overflow-y-auto">
                    <div class="p-8">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-black uppercase tracking-tight">Booking Details</h3>
                            <button onclick="this.closest('.fixed').remove()" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-xl hover:bg-gray-200 transition">
                                <i class="fa-solid fa-x text-gray-500 text-sm"></i>
                            </button>
                        </div>
                        
                        <div class="space-y-6">
                            <div class="bg-indigo-50 p-4 rounded-2xl">
                                <p class="text-[10px] font-black text-indigo-600 uppercase mb-2">Room Information</p>
                                <h4 class="text-lg font-bold text-gray-800">${booking.room_name}</h4>
                                <p class="text-sm text-gray-600 mt-1">${formattedRoomType}</p>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-emerald-50 p-4 rounded-2xl">
                                    <p class="text-[10px] font-black text-emerald-600 uppercase mb-2">Payment Amount</p>
                                    <p class="text-lg font-bold text-gray-800">₱${roomPrice.toLocaleString()}</p>
                                    <p class="text-[10px] text-gray-500 mt-1">Monthly Rate</p>
                                </div>
                                
                                <div class="bg-amber-50 p-4 rounded-2xl">
                                    <p class="text-[10px] font-black text-amber-600 uppercase mb-2">Duration</p>
                                    <p class="text-lg font-bold text-gray-800">${booking.duration || 1} Month${booking.duration > 1 ? 's' : ''}</p>
                                    <p class="text-[10px] text-gray-500 mt-1">Contract Period</p>
                                </div>
                            </div>
                            
                            <div class="bg-gray-50 p-4 rounded-2xl">
                                <p class="text-[10px] font-black text-gray-600 uppercase mb-2">Booking Date</p>
                                <p class="text-sm font-bold text-gray-800">${(() => {
                                    let dateObj;
                                    // Handle Firestore timestamp objects with _seconds property
                                    if (booking.created_at?._seconds) {
                                        dateObj = new Date(booking.created_at._seconds * 1000);
                                    } else if (booking.start_date) {
                                        dateObj = new Date(booking.start_date);
                                    } else {
                                        return 'No date available';
                                    }
                                    return dateObj.toLocaleDateString('en-PH', { 
                                        year: 'numeric', 
                                        month: 'long', 
                                        day: 'numeric' 
                                    });
                                })()}</p>
                            </div>
                            
                            ${booking.request ? `
                            <div class="bg-purple-50 p-4 rounded-2xl">
                                <p class="text-[10px] font-black text-purple-600 uppercase mb-2">Special Request</p>
                                <p class="text-sm text-gray-800">${booking.request}</p>
                            </div>
                            ` : ''}
                            
                            <div class="bg-blue-50 p-4 rounded-2xl">
                                <p class="text-[10px] font-black text-blue-600 uppercase mb-2">Booking Status</p>
                                <span class="px-3 py-1 bg-blue-100 text-blue-600 text-xs font-black rounded-full uppercase">Booked</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function checkDueAlerts(myActiveRooms) {
            const notifItems = document.getElementById('notif-items');
            const notifBadge = document.getElementById('notif-badge');
            if (!notifItems || !notifBadge) return;

            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let alerts = [];
            const dismissedRooms = JSON.parse(localStorage.getItem('dismissed-alert-rooms') || '[]');

            // Add payment due alerts
            myActiveRooms.forEach(room => {
                const moveInDate = new Date(room.start_date);
                const dueDate = new Date(moveInDate);
                dueDate.setMonth(moveInDate.getMonth() + 1);
                dueDate.setHours(0, 0, 0, 0);

                const timeDiff = dueDate - today;
                const daysLeft = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));

                // Notify if 5 days or less, matching History logic
                if (daysLeft <= 5 && !dismissedRooms.includes(room.room_name)) {
                    const isUrgent = daysLeft <= 0;
                    const statusText = daysLeft === 0 ? 'due today' : (daysLeft < 0 ? 'overdue' : 'due in ' + daysLeft + ' days');
                    
                    alerts.push({
                        title: isUrgent ? 'Action Required' : 'Payment Upcoming',
                        text: `Rent for ${room.room_name} is ${statusText}.`,
                        color: isUrgent ? 'red' : 'amber',
                        room_name: room.room_name,
                        type: 'payment'
                    });
                }
            });

            // Cache payment alerts immediately (synchronous)
            cachedAlerts = [...alerts];

            // Fetch booking status notifications asynchronously
            (async () => {
                try {
                    if (user.id) {
                        const notifRes = await fetch(`/api/notifications/${user.id}?t=${Date.now()}`);
                        const notifications = await notifRes.json();
                        
                        // Add approval/rejection notifications to alerts
                        notifications.forEach(notif => {
                            alerts.unshift({
                                title: notif.status === 'Approved' ? 'Booking Approved ✓' : 'Booking Rejected ✗',
                                text: `Your booking for <strong>${notif.room_name}</strong> (${notif.room_type}) has been ${notif.status.toLowerCase()}.`,
                                color: notif.status === 'Approved' ? 'green' : 'red',
                                type: 'booking_status',
                                notification_id: notif.id
                            });
                        });

                        // Update cache with complete alerts
                        cachedAlerts = [...alerts];
                    }
                } catch (err) {
                    console.error('Error fetching notifications:', err);
                }

                const badgeViewed = await isBadgeViewed();
                if (alerts.length > 0 && !badgeViewed) {
                    notifBadge.classList.remove('hidden');
                } else {
                    notifBadge.classList.add('hidden');
                }

                // Render alerts using renderNotificationHTML
                if (alerts.length > 0) {
                    notifItems.innerHTML = alerts.map((a) => renderNotificationHTML(a)).join('');
                } else {
                    notifItems.innerHTML = `<div class="p-10 text-center opacity-30 text-[10px] font-black uppercase italic">No new alerts</div>`;
                }
            })();
        }

        function dismissNotification(roomName, notifId) {
            if (roomName) {
                dismissAlert(roomName);
            }
            if (notifId) {
                // Mark notification as read (optional, can add API call later)
                console.log('Dismissed notification:', notifId);
            }
        }

        function openRefundModal(booking) {
            document.getElementById('refund-booking-id').value = booking.id;
            document.getElementById('refund-room-name').value = booking.room_name;
            document.getElementById('refund-room-display').value = booking.room_name;
            document.getElementById('refund-amount-display').value = `₱${(parseFloat(booking.amount_paid) || 0).toLocaleString()}`;
            document.getElementById('refund-full-name').value = booking.user_name || booking.student_name || '';
            document.getElementById('refund-contact-number').value = '';
            document.getElementById('refund-modal').classList.remove('hidden');
        }

        function closeRefundModal() {
            document.getElementById('refund-modal').classList.add('hidden');
        }

        async function submitRefundRequest() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const bookingId = document.getElementById('refund-booking-id').value;
            const roomName = document.getElementById('refund-room-name').value;
            const fullName = document.getElementById('refund-full-name').value.trim();
            const contactNumber = document.getElementById('refund-contact-number').value.trim();

            if (!fullName || !contactNumber) {
                alert('Please fill your full name and contact number.');
                return;
            }

            try {
                const res = await fetch('/api/refund/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: user.id, booking_id: bookingId, full_name: fullName, contact_number: contactNumber, room_name: roomName })
                });

                if (res.ok) {
                    alert('Refund request submitted successfully. Admin will review it shortly.');
                    closeRefundModal();
                    await loadUserData(user);
                } else {
                    const err = await res.json().catch(() => ({}));
                    alert('Refund request error: ' + (err.error || err.message || 'Unable to submit.'));
                }
            } catch (err) {
                console.error('Refund request error:', err);
                alert('Network error. Please try again.');
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar-drawer').classList.toggle('translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }

        let cachedAlerts = [];

        function toggleDropdown(e, id) {
            e.stopPropagation();
            const target = document.getElementById(id);
            document.querySelectorAll('.dropdown-menu').forEach(m => { if(m !== target) m.classList.remove('show'); });
            target.classList.toggle('show');
            // Mark badge as viewed and dismiss when notification dropdown opens
            if (id === 'notif-dropdown' && target.classList.contains('show')) {
                markBadgeAsViewed();
                const badge = document.getElementById('notif-badge');
                if (badge) badge.classList.add('hidden');
                // Display cached notifications immediately (no delay)
                const notifItems = document.getElementById('notif-items');
                if (notifItems && cachedAlerts.length > 0) {
                    notifItems.innerHTML = cachedAlerts.map((a) => renderNotificationHTML(a)).join('');
                }
                // Then refresh notifications in the background
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                if (user.id) {
                    loadAndDisplayNotifications(user);
                }
            }
        }

        async function loadAndDisplayNotifications(user) {
            const notifItems = document.getElementById('notif-items');
            if (!notifItems) return;

            try {
                const res = await fetch('/api/admin/bookings?t=' + Date.now());
                const bookings = await res.json();
                const myActiveRooms = bookings.filter(b => b.status === 'Approved' && b.user_name === user.name);
                
                let alerts = [];
                const today = new Date();
                today.setHours(0,0,0,0);
                const dismissedRooms = JSON.parse(localStorage.getItem('dismissed-alert-rooms') || '[]');

                // Add payment due alerts
                myActiveRooms.forEach(room => {
                    const moveInDate = new Date(room.start_date);
                    const dueDate = new Date(moveInDate);
                    dueDate.setMonth(moveInDate.getMonth() + 1);
                    dueDate.setHours(0,0,0,0);

                    const timeDiff = dueDate - today;
                    const daysLeft = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));

                    if (daysLeft <= 5 && !dismissedRooms.includes(room.room_name)) {
                        const isUrgent = daysLeft <= 0;
                        const statusText = daysLeft === 0 ? 'due today' : (daysLeft < 0 ? 'overdue' : 'due in ' + daysLeft + ' days');
                        
                        alerts.push({
                            title: isUrgent ? 'Action Required' : 'Payment Upcoming',
                            text: `Rent for ${room.room_name} is ${statusText}.`,
                            color: isUrgent ? 'red' : 'amber',
                            room_name: room.room_name,
                            type: 'payment'
                        });
                    }
                });

                // Fetch booking status notifications
                try {
                    const notifRes = await fetch(`/api/notifications/${user.id}?t=${Date.now()}`);
                    const notifications = await notifRes.json();
                    
                    // Add approval/rejection notifications to alerts (at the top)
                    notifications.forEach(notif => {
                        alerts.unshift({
                            title: notif.status === 'Approved' ? 'Booking Approved ✓' : 'Booking Rejected ✗',
                            text: `Your booking for <strong>${notif.room_name}</strong> (${notif.room_type}) has been ${notif.status.toLowerCase()}.`,
                            color: notif.status === 'Approved' ? 'green' : 'red',
                            type: 'booking_status',
                            notification_id: notif.id
                        });
                    });
                } catch (err) {
                    console.error('Error fetching notifications:', err);
                }

                // Cache alerts for instant display on next bell click
                cachedAlerts = alerts;

                // Render notifications with proper Tailwind colors
                if (alerts.length > 0) {
                    notifItems.innerHTML = alerts.map((a) => renderNotificationHTML(a)).join('');
                } else {
                    notifItems.innerHTML = `<div class="p-10 text-center opacity-30 text-[10px] font-black uppercase italic">No new alerts</div>`;
                }
            } catch (err) {
                console.error('Error loading notifications:', err);
            }
        }

        function renderNotificationHTML(a) {
            const colorMap = {
                'red': 'bg-red-50 border-red-100 text-red-600',
                'green': 'bg-green-50 border-green-100 text-green-600',
                'amber': 'bg-amber-50 border-amber-100 text-amber-600'
            };
            const styles = colorMap[a.color] || colorMap['amber'];
            const [bgColor, borderColor, textColor] = styles.split(' ');

            return `
                <div class="p-4 rounded-2xl ${bgColor} border ${borderColor} flex justify-between items-start gap-3">
                    <div class="flex-1">
                        <p class="text-[10px] font-black uppercase ${textColor} tracking-widest mb-1">${a.title}</p>
                        <p class="text-[11px] font-bold text-gray-800 leading-tight">${a.text}</p>
                    </div>
                    <button onclick="dismissNotification('${a.room_name || ''}', '${a.notification_id || ''}')" class="flex-shrink-0 text-gray-400 hover:text-gray-600 transition">
                        <i class="fa-solid fa-times text-sm"></i>
                    </button>
                </div>
            `;
        }

        function logout() { localStorage.removeItem('user'); window.location.href = 'auth.html'; }

        window.onclick = () => {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.add('hidden'));
        };
    </script>
    <script src="page-loader.js"></script>
</body>
</html>
